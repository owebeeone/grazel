# The daemon's wire contract: native Rust types + a deterministic-CBOR codec,
# GENERATED from `wire/razel.taut.py` (the governed taut IR) into `src/generated.rs`.
# Regenerate with `cargo xtask codegen`; `cargo xtask codegen --check` gates drift.
# Zero dependencies on purpose: the CBOR codec is hand-rolled for byte-exact
# cross-language parity (see src/cbor.rs) — serde/ciborium would break the corpus.

